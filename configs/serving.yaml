# Serving configuration
server:
  host: "0.0.0.0"
  port: 8000
  workers: 1
  log_level: "info"

model:
  default: "hybrid"
  device: "cpu"
  input_size: 512
  batch_max: 10
  warmup_on_start: true

preprocessing:
  resize: [512, 512]
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

postprocessing:
  threshold: 0.5
  min_area: 100

api:
  title: "MedSeg API"
  version: "0.1.0"
  prefix: "/api/v1"
  cors_origins: ["*"]
  rate_limit:
    requests: 100
    window: 60
