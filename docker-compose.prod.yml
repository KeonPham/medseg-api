services:
  # ─── Caddy — automatic HTTPS reverse proxy ───
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # TLS certs
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ─── API — FastAPI + PyTorch inference ───
  api:
    build: .
    expose:
      - "8000"
    volumes:
      - ./models:/app/models:ro
      - ./configs:/app/configs
      - app_data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/predictions.db
      - MODEL_DIR=./models
      - DEFAULT_MODEL=hybrid
      - DEVICE=cpu
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # Limit memory to stay within Oracle free tier
    deploy:
      resources:
        limits:
          memory: 8G

  # ─── Postgres — prediction logging ───
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medseg
      POSTGRES_USER: medseg
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medseg"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  app_data:
